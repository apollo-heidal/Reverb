services:
  prod-db:
    image: postgres:16
    hostname: prod-db
    labels:
      dev.reverb.quickstart.managed: "true"
      dev.reverb.quickstart.app: "__QUICKSTART_APP_SLUG__"
      dev.reverb.quickstart.fingerprint: "reverb-quickstart-v1"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickstart_dev
    volumes:
      - prod_db_data:/var/lib/postgresql/data

  reverb-db:
    image: postgres:16
    hostname: reverb-db
    labels:
      dev.reverb.quickstart.managed: "true"
      dev.reverb.quickstart.app: "__QUICKSTART_APP_SLUG__"
      dev.reverb.quickstart.fingerprint: "reverb-quickstart-v1"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reverb_dev
    volumes:
      - reverb_db_data:/var/lib/postgresql/data

  prod:
    image: __QUICKSTART_PROD_IMAGE__
    hostname: prod
    restart: unless-stopped
    labels:
      dev.reverb.quickstart.managed: "true"
      dev.reverb.quickstart.app: "__QUICKSTART_APP_SLUG__"
      dev.reverb.quickstart.fingerprint: "reverb-quickstart-v1"
    env_file:
      - .env.reverb
    depends_on:
      - prod-db
    security_opt:
      - label=disable
    environment:
      MIX_ENV: dev
      PHX_SERVER: "true"
      PORT: "4000"
      PHX_HOST: localhost
      DATABASE_URL: ecto://postgres:postgres@prod-db/quickstart_dev
      APP_NODE_NAME: prod
      APP_USE_SHORTNAME: "true"
      QUICKSTART_WORKSPACE_ROOT: /workspace_root
      REVERB_MODE: emitter
      REVERB_OPERATOR_URL: http://reverb:4010
    ports:
      - "__APP_PORT__:4000"
    volumes:
      - "__WORKSPACE_ROOT_HOST_PATH__:/workspace_root__BIND_MOUNT_SUFFIX__"

  reverb:
    image: __REVERB_IMAGE__
    hostname: reverb
    restart: unless-stopped
    labels:
      dev.reverb.quickstart.managed: "true"
      dev.reverb.quickstart.app: "__QUICKSTART_APP_SLUG__"
      dev.reverb.quickstart.fingerprint: "reverb-quickstart-v1"
    env_file:
      - .env.reverb
    depends_on:
      - prod
      - reverb-db
    security_opt:
      - label=disable
    environment:
      MIX_ENV: prod
      REVERB_MODE: receiver
      REVERB_START_PUBSUB: "true"
      REVERB_AGENT_ENABLED: "true"
      REVERB_DATABASE_URL: ecto://postgres:postgres@reverb-db/reverb_dev
      REVERB_POOL_SIZE: "5"
      REVERB_NODE_NAME: reverb
      REVERB_USE_SHORTNAME: "true"
      REVERB_PROD_NODE: prod@prod
      REVERB_ALLOWED_NODES: prod@prod
      REVERB_AGENT_ADAPTER: opencode
      REVERB_AGENT_MAX_AGENTS: "1"
      REVERB_OPERATOR_ENABLED: "true"
      REVERB_OPERATOR_IP: 0.0.0.0
      REVERB_OPERATOR_PORT: "4010"
      REVERB_YOLO_MODE: "true"
      REVERB_SCHED_START_PAUSED: "true"
      REVERB_WORKSPACE_ROOT: /workspaces
      REVERB_WORKSPACE_REPO_ROOT: /workspace_root/__QUICKSTART_APP_SLUG__/app
      REVERB_VALIDATION_COMMANDS: mix compile;;mix assets.deploy
      REVERB_OPENCODE_WEB_ENABLED: "true"
      REVERB_OPENCODE_WEB_HOST: 0.0.0.0
      REVERB_OPENCODE_WEB_PORT: "4096"
      REVERB_OPENCODE_WEB_WORKDIR: /workspace_root/__QUICKSTART_APP_SLUG__/app
    ports:
      - "127.0.0.1:__OPENCODE_PORT__:4096"
    volumes:
      - "__WORKSPACE_ROOT_HOST_PATH__:/workspace_root__BIND_MOUNT_SUFFIX__"
      - reverb_workspaces:/workspaces
      - opencode_data:/root/.local/share/opencode

volumes:
  prod_db_data:
  reverb_db_data:
  reverb_workspaces:
  opencode_data:
