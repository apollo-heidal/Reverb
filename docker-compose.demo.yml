services:
  reverb-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reverb_dev
    volumes:
      - reverb_db_data:/var/lib/postgresql/data

  demo-dev:
    build:
      context: .
      dockerfile: docker/demo_app.Dockerfile
    environment:
      MIX_ENV: dev
      REVERB_MODE: disabled
      REVERB_PATH: /opt/reverb
      DEMO_DEV_NODE_NAME: demo_dev@demo-dev
      REVERB_ERLANG_COOKIE: reverb_demo_cookie
      DEMO_DEV_APP_ROOT: /workspace/reverb_demo_app
    entrypoint: ["/opt/reverb/docker/demo-dev-entrypoint.sh"]
    volumes:
      - reverb_demo_repo:/workspace

  reverb:
    build:
      context: .
      dockerfile: docker/reverb.Dockerfile
    depends_on:
      - reverb-db
      - demo-dev
    environment:
      MIX_ENV: prod
      REVERB_MODE: receiver
      REVERB_START_PUBSUB: "true"
      REVERB_AGENT_ENABLED: "true"
      REVERB_DATABASE_URL: ecto://postgres:postgres@reverb-db/reverb_dev
      REVERB_POOL_SIZE: "5"
      REVERB_NODE_NAME: reverb@reverb
      REVERB_ERLANG_COOKIE: reverb_demo_cookie
      REVERB_PUBSUB_NAME: ReverbDemoApp.PubSub
      REVERB_TOPIC_HASH: reverb-demo-app
      REVERB_PROD_NODE: demo_prod@demo-prod
      REVERB_ALLOWED_NODES: demo_prod@demo-prod
      REVERB_AGENT_ADAPTER: generic
      REVERB_AGENT_COMMAND: /opt/reverb/scripts/demo_agent.sh
      REVERB_AGENT_MODEL: gpt-5.4
      REVERB_PATH: /opt/reverb
      REVERB_AGENT_MAX_AGENTS: "1"
      REVERB_OPERATOR_ENABLED: "true"
      REVERB_OPERATOR_PORT: "4010"
      REVERB_YOLO_MODE: "true"
      REVERB_WORKSPACE_ROOT: /workspaces
      REVERB_WORKSPACE_REPO_ROOT: /sandbox/reverb_demo_app
      REVERB_VALIDATION_COMMANDS: mix compile;;mix test
    volumes:
      - reverb_workspaces:/workspaces
      - reverb_demo_repo:/sandbox

  demo-prod:
    build:
      context: .
      dockerfile: docker/demo_app.Dockerfile
    depends_on:
      - reverb
    environment:
      MIX_ENV: prod
      DEMO_NODE_NAME: demo_prod@demo-prod
      REVERB_PATH: /opt/reverb
      REVERB_ERLANG_COOKIE: reverb_demo_cookie
      REVERB_TOPIC_HASH: reverb-demo-app
      DEMO_EMIT_INTERVAL_MS: "15000"
      REVERB_DEMO_SOURCE: ReverbDemoApp.ProdEmitter

volumes:
  reverb_db_data:
  reverb_workspaces:
  reverb_demo_repo:
