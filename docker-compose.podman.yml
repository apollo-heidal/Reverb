services:
  reverb-db:
    network_mode: host
    command: ["postgres", "-p", "5544"]

  demo-dev:
    network_mode: host
    environment:
      DEMO_DEV_NODE_NAME: demo_dev@127.0.0.1

  reverb:
    network_mode: host
    environment:
      REVERB_DATABASE_URL: ecto://postgres:postgres@127.0.0.1:5544/reverb_dev
      REVERB_NODE_NAME: reverb@127.0.0.1
      REVERB_PROD_NODE: demo_prod@127.0.0.1
      REVERB_ALLOWED_NODES: demo_prod@127.0.0.1

  demo-prod:
    network_mode: host
    environment:
      DEMO_NODE_NAME: demo_prod@127.0.0.1
